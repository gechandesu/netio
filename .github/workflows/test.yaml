name: Lint and test
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        vflags:
          - ''
          - '-cc gcc -cstrict'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup V
        run: |
          git clone --depth=1 https://github.com/vlang/v /tmp/v && cd /tmp/v && make
          /tmp/v/v symlink

      - name: Run tests
        run: |
          v fmt -verify .
          v vet -v -W -I -F -r .
          export VFLAGS='-path "../|@vlib" ${{ matrix.vflags }}'
          v test .

  test-windows-gcc:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup V
        shell: bash
        run: |
          mkdir D:\\Temp
          git clone --depth=1 https://github.com/vlang/v D:\\Temp\\v && cd D:\\Temp\\v && .\\makev.bat -gcc
          echo D:\\Temp\\v >> $GITHUB_PATH

      - name: Run tests
        shell: bash
        run: |
          v fmt -verify .
          v vet -v -W -I -F -r .
          export VFLAGS='-path "../|@vlib" -cc gcc'
          v -stats test .
